<!-- Elegant editorial footer -->
<footer class="bg-stone-100 border-t border-stone-200/20 mt-20">
  <div class="flex flex-col md:flex-row justify-between items-center px-8 md:px-12 py-16 w-full max-w-screen-2xl mx-auto gap-8">

    <!-- Hotel info -->
    <div class="text-center md:text-left">
      <div class="text-lg font-headline italic text-primary">
        {{ site.data.content.hotel.name }}
      </div>
      <p class="font-body text-xs uppercase tracking-widest leading-loose text-stone-500 mt-4">
        &copy; {{ "now" | date: "%Y" }} {{ site.data.content.hotel.name }}. {{ site.data.content.footer.text }}
      </p>
    </div>

    <!-- Footer navigation -->
    <nav class="flex flex-wrap justify-center gap-8">
      {% for link in site.data.content.footer.links %}
      <a href="{{ link.link }}" class="font-body text-xs uppercase tracking-widest text-stone-500 hover:text-primary underline-offset-4 hover:underline transition-all">
        {{ link.label }}
      </a>
      {% endfor %}
    </nav>

    <!-- Phone -->
    <a href="tel:{{ site.data.content.hotel.phone }}" class="inline-flex items-center gap-2 text-primary font-bold text-lg hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined">call</span>
      {{ site.data.content.hotel.phone_display }}
    </a>

  </div>
</footer>
