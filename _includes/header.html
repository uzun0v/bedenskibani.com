<!-- Glassmorphism sticky header with navigation and phone -->
<header class="bg-stone-50/70 backdrop-blur-xl sticky top-0 z-50">
  <div class="flex justify-between items-center px-6 md:px-8 py-5 w-full max-w-screen-2xl mx-auto">

    <!-- Hotel name -->
    <a href="#home" class="text-lg md:text-xl font-headline font-bold text-primary uppercase tracking-widest">
      {{ site.data.content.hotel.name }}
    </a>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center space-x-10" aria-label="Main navigation">
      {% for item in site.data.content.nav %}
      <a href="{{ item.link }}" class="text-on-surface-variant hover:text-primary transition-colors font-headline font-bold text-lg tracking-tight">
        {{ item.label }}
      </a>
      {% endfor %}
    </nav>

    <!-- Phone + Viber -->
    <div class="flex items-center gap-2">
      <a href="tel:{{ site.data.content.hotel.phone }}" class="inline-flex items-center gap-2 bg-gradient-to-br from-primary to-primary-container text-on-primary px-6 py-3 rounded-lg font-body text-sm md:text-base uppercase tracking-wide hover:opacity-90 transition-opacity font-semibold">
        <span class="material-symbols-outlined text-lg">call</span>
        {{ site.data.content.hotel.phone_display }}
      </a>
      {% if site.data.content.hotel.viber %}
      <a href="viber://chat?number={{ site.data.content.hotel.viber | uri_escape }}" class="inline-flex items-center gap-1 bg-[#7360f2] text-white px-4 py-3 rounded-lg font-body text-sm uppercase tracking-wide hover:bg-[#5d4bd4] transition-colors font-semibold" title="Viber">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 0C9.473.028 5.333.344 3.02 2.467.953 4.4.323 7.3.1 12.96c-.213 5.667.667 9.147 3.093 10.48l.013 3.36s-.02.84.52 1.013c.653.213 1.04-.427 1.667-1.107.347-.373.82-.92 1.18-1.34 3.253.28 5.76-.347 6.04-.44.653-.213 4.347-.68 4.947-5.56.62-5.027-.293-8.2-2.007-9.633l-.007-.007c-.373-.427-2.667-2.6-7.46-2.707 0 0-.387-.027-.687-.02zm.147 1.88c.247-.007.447.013.447.013 3.953.087 5.96 1.833 6.273 2.2h.007c1.4 1.173 2.093 3.96 1.553 8.24-.48 3.933-3.4 4.24-3.947 4.42-.233.073-2.347.6-5.12.44 0 0-2.027 2.44-2.66 3.08-.1.1-.22.14-.3.12-.113-.027-.14-.147-.14-.327l.02-3.327c-1.96-1.08-2.667-3.8-2.487-8.48.187-4.64.673-7 1.487-7.833C7.86 2.66 11.3 1.887 11.547 1.88zm-.4 2.453c-.213 0-.213.327 0 .34.933.053 1.787.327 2.467.84.673.513 1.107 1.207 1.28 2.04.04.213.38.173.34-.04-.2-.96-.7-1.747-1.467-2.327-.76-.573-1.707-.873-2.62-.853zm.967 1.5c-.207-.007-.22.307-.013.327.64.113 1.187.6 1.393 1.267.047.2.36.16.327-.047-.147-.56-.453-1.013-.92-1.3a1.48 1.48 0 00-.787-.247zm-3.587.727c-.16-.02-.347.04-.527.193l-.007.007c-.36.313-.627.827-.567 1.273.02.16.067.32.147.467l.027.053c.333.72.74 1.407 1.213 2.053.613.867 1.347 1.653 2.18 2.327l.027.02.02.02.013.013h.007l.007.007c.873.647 1.653 1.147 2.32 1.487l.053.027c.147.073.307.127.467.147h.013c.46.047.953-.213 1.273-.567.16-.187.24-.387.227-.567-.013-.187-.107-.34-.3-.48l-.96-.72c-.373-.287-.753-.113-.92.007l-.36.313-.14.133-.073-.04a9.907 9.907 0 01-2.08-1.8 9.907 9.907 0 01-1.3-1.9l-.04-.073.047-.047.107-.107.28-.327c.153-.18.273-.553-.013-.92l-.747-.98c-.12-.16-.26-.247-.393-.267zm3.393.527c-.207-.007-.24.307-.033.34.373.06.573.34.62.687.013.2.34.187.327-.02a1.196 1.196 0 00-.914-.007z"/></svg>
      </a>
      {% endif %}
    </div>

  </div>

  <!-- Mobile nav -->
  <nav class="md:hidden flex justify-center gap-6 px-4 pb-4" aria-label="Mobile navigation">
    {% for item in site.data.content.nav %}
    <a href="{{ item.link }}" class="text-on-surface-variant hover:text-primary transition-colors font-headline font-bold text-base">
      {{ item.label }}
    </a>
    {% endfor %}
  </nav>
</header>
