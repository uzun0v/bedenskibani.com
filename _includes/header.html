<!-- Glassmorphism sticky header with navigation and phone -->
<header class="bg-stone-50/70 backdrop-blur-xl sticky top-0 z-50">
  <div class="flex justify-between items-center px-6 md:px-8 py-5 w-full max-w-screen-2xl mx-auto">

    <!-- Hotel name -->
    <a href="#home" class="text-lg md:text-xl font-headline font-bold text-primary uppercase tracking-widest">
      {{ site.data.content.hotel.name }}
    </a>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center space-x-10" aria-label="Main navigation">
      {% for item in site.data.content.nav %}
      <a href="{{ item.link }}" class="text-on-surface-variant hover:text-primary transition-colors font-headline font-bold text-lg tracking-tight">
        {{ item.label }}
      </a>
      {% endfor %}
    </nav>

    <!-- Phone number - always visible, large -->
    <a href="tel:{{ site.data.content.hotel.phone }}" class="inline-flex items-center gap-2 bg-gradient-to-br from-primary to-primary-container text-on-primary px-6 py-3 rounded-lg font-body text-sm md:text-base uppercase tracking-wide hover:opacity-90 transition-opacity font-semibold">
      <span class="material-symbols-outlined text-lg">call</span>
      {{ site.data.content.hotel.phone_display }}
    </a>

  </div>

  <!-- Mobile nav -->
  <nav class="md:hidden flex justify-center gap-6 px-4 pb-4" aria-label="Mobile navigation">
    {% for item in site.data.content.nav %}
    <a href="{{ item.link }}" class="text-on-surface-variant hover:text-primary transition-colors font-headline font-bold text-base">
      {{ item.label }}
    </a>
    {% endfor %}
  </nav>
</header>
