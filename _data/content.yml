# --- Предимства (Бенто секция) ---
features:
  - title: "Терапевтичен басейн"
    description: "Вътрешен басейн с минерална вода при температура 35–38°C. Водата се сменя ежедневно. Хипертермална, високо минерализирана, хидрокарбонатно-сулфатна."
    link_text: "Обадете се за резервация"
    image: "/assets/images/mineral-baths.jpg"
    image_alt: "Вътрешен терапевтичен басейн с минерална вода"
  - title: "Двойни и тройни стаи"
    label: "Настаняване"
    description: "Стаи с минибар, интернет, цифрова телевизия и самостоятелна баня. Двойни стаи с две легла или спалня, тройни стаи със спалня и единично легло."
    link_text: "Резервирайте стая"
    image: "/assets/images/suites.jpg"
    image_alt: "Уютна хотелска стая в Беденски Бани"

# --- Лечение и рехабилитация (Редакционна секция) ---
experience:
  label: "Балнеологична оценка"
  title: "Лечебната сила на"
  title_italic: "Минералната вода"
  description: "Минералната вода от находище Беденски бани е хипертермална, високо минерализирана, хидрокарбонатно-сулфатна, натриева и силициева. Съдържа флуорид, въглероден диоксид и метасилициева киселина (129.2 мг/л). Чиста от санитарно-химични и микробиологични замърсявания."
  details:
    - title: "Питейно лечение"
      text: "Въздейства върху стомашно-чревния тракт, жлъчно-чернодробната и бъбречно-отделителната системи."
    - title: "Външно лечение"
      text: "При ставни заболявания, периферна нервна система, ортопедични и дерматологични състояния."
  link_text: "Вижте пакетите"
  image: "/assets/images/spa-oils.jpg"
  image_alt: "Минерална вода и спа процедури"

# --- Услуги ---
