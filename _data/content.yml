  heading: "Какво предлагаме"
  subtitle: "Грижа за тялото и духа в сърцето на Родопите"
  items:
    - title: "Басейн и джакузи"
      description: "Вътрешен терапевтичен басейн (35–38°C) и външно джакузи с минерална вода и панорамна гледка към планината."
      image: "/assets/images/winter-room.jpg"
      image_alt: "Минерален басейн"
    - title: "Рехабилитация"
      description: "Възстановителен център с 20 лечебни процедури по НЗОК: хидротерапия, тангентор, електротерапия, ултразвук, магнитотерапия, луголечение, калолечение, масаж, лимфен дренаж."
      image: "/assets/images/dining.jpg"
      image_alt: "Рехабилитационни процедури"
    - title: "Ресторант"
      description: "Традиционни родопски ястия от висококачествени натурални продукти. Работно време: 08:00 – 21:30."
      image: "/assets/images/alpine-lake.jpg"
      image_alt: "Ресторант с традиционна родопска кухня"

